<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Estate Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .login-card { border-radius: 15px; margin-top: 100px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .btn-primary { background-color: #0d6efd; border: none; }
        .btn-primary:hover { background-color: #0b5ed7; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card p-4 border-0 login-card">
                <div class="text-center mb-4">
                    <i class="bi bi-houses-fill text-primary" style="font-size: 3rem;"></i>
                    <h3 class="fw-bold mt-2">Estate Login</h3>
                    <p class="text-muted small">Enter your credentials to access the system</p>
                </div>
                
                <form action="dashboard.html" method="GET">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Phone Number</label>
                        <input type="text" name="phone" class="form-control" placeholder="e.g. 0706493316" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Password</label>
                        <div class="input-group">
                            <input type="password" name="password" id="pass" class="form-control" placeholder="••••••••" required>
                            <span class="input-group-text" style="cursor:pointer;" onclick="toggle()">
                                <i class="bi bi-eye" id="eye"></i>
                            </span>
                        </div>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="remember">
                        <label class="form-check-label small" for="remember">Remember me</label>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fw-bold py-2">Login to System</button>
                </form>
                
                <div class="text-center mt-4">
                    <p class="small text-muted">Don't have an account? <a href="#" class="text-decoration-none">Contact Admin</a></p>
                </div>
            </div>
            <p class="text-center mt-4 text-muted small">&copy; 2026 Estate Pro Management System</p>
        </div>
    </div>
</div>

<script>
function toggle() {
    var x = document.getElementById("pass");
    var y = document.getElementById("eye");
    if (x.type === "password") {
        x.type = "text";
        y.classList.replace("bi-eye", "bi-eye-slash");
    } else {
        x.type = "password";
        y.classList.replace("bi-eye-slash", "bi-eye");
    }
}
</script>
</body>
</html>
